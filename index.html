<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Ollie's Tasks"/>
  <meta name="theme-color" content="#F5F3EF"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Ollie's Goals &amp; Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #F5F3EF;
      --bg-card: #FFFFFF;
      --bg-inset: #ECEAE5;
      --orange: #E8731A;
      --orange-light: #FFF3E8;
      --orange-dim: rgba(232,115,26,0.15);
      --orange-hover: #D4650F;
      --charcoal: #2D2D2D;
      --text-secondary: #5A5A5A;
      --text-faint: #8A8A8A;
      --border: #E0DDD8;
      --border-light: #ECEAE5;
      --danger: #D94040;
      --danger-light: #FFF0F0;
      --danger-dim: rgba(217,64,64,0.15);
      --success: #2E8B57;
      --success-light: #EEFBF3;
      --success-dim: rgba(46,139,87,0.15);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.10);
      --radius: 14px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100%; overscroll-behavior: none }
    html { font-size: clamp(16px, 1.8vw, 22px) }
    body {
      font-family: 'Atkinson Hyperlegible Next', 'Atkinson Hyperlegible', system-ui, sans-serif;
      background: var(--bg); color: var(--charcoal);
      min-height: 100dvh; line-height: 1.5; letter-spacing: 0.01em;
      -webkit-text-size-adjust: 100%;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    ::-webkit-scrollbar { width: 4px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      padding: 1rem 1.25rem 0.75rem;
      padding-top: calc(1rem + env(safe-area-inset-top, 0px));
    }
    .header-inner { max-width: 640px; margin: 0 auto }
    .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 0.5rem }
    .title-left { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0 }
    .app-title {
      font-size: clamp(1.05rem, 2.2vw, 1.4rem);
      font-weight: 800; color: var(--charcoal); line-height: 1.2;
      white-space: nowrap;
    }
    .app-title span { color: var(--orange) }

    /* Meme button */
    .meme-btn {
      width: 2.2rem; height: 2.2rem; border-radius: 50%;
      background: var(--bg-card); border: 1.5px solid var(--border);
      cursor: pointer; font-size: 1.2rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
      animation: meme-wobble 3s ease-in-out infinite;
    }
    .meme-btn:active { transform: scale(0.85); border-color: var(--orange) }
    @keyframes meme-wobble {
      0%, 85%, 100% { transform: rotate(0) }
      88% { transform: rotate(-8deg) }
      91% { transform: rotate(8deg) }
      94% { transform: rotate(-5deg) }
      97% { transform: rotate(3deg) }
    }

    .btn-row { display: flex; gap: 0.4rem; flex-shrink: 0 }
    .ghost-btn {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.35rem 0.65rem;
      font-size: clamp(0.6rem, 1vw, 0.75rem); font-weight: 700;
      color: var(--text-faint); cursor: pointer; font-family: inherit;
      transition: all 0.15s; white-space: nowrap;
    }
    .ghost-btn:active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange) }
    .ghost-btn.danger { color: var(--danger) }
    .ghost-btn.danger:active { background: var(--danger-light); border-color: var(--danger) }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 0.4rem }
    .tab {
      flex: 1; padding: 0.55rem 0; text-align: center;
      font-size: clamp(0.8rem, 1.5vw, 1rem); font-weight: 700;
      color: var(--text-faint); background: var(--bg-card);
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .tab.active { color: var(--orange); border-color: var(--orange); background: var(--orange-light) }
    .tab.disabled { opacity: 0.4; cursor: default }

    /* ── Body ── */
    #body {
      max-width: 640px; margin: 0 auto;
      padding: 0.75rem 1.25rem 7rem;
      padding-bottom: calc(7rem + env(safe-area-inset-bottom, 0px));
    }
    .hint {
      font-size: clamp(0.75rem, 1.3vw, 0.9rem);
      color: var(--text-faint); margin-bottom: 1rem; line-height: 1.5;
    }

    /* ── Category sections ── */
    .cat-section { margin-bottom: 1.25rem }
    .cat-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem }
    .cat-dot { width: 0.4rem; height: 0.4rem; border-radius: 50%; flex-shrink: 0 }
    .cat-name {
      font-size: clamp(0.65rem, 1.1vw, 0.8rem); font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint);
    }

    /* ── Task cards ── */
    .card {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--bg-card); border: 1.5px solid var(--border-light);
      box-shadow: var(--shadow); border-radius: var(--radius);
      padding: 0.7rem 0.75rem; margin-bottom: 0.5rem;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .task-text {
      flex: 1; font-size: clamp(0.9rem, 1.7vw, 1.2rem);
      line-height: 1.4; word-break: break-word;
    }
    .task-cat-label {
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      color: var(--text-faint); margin-top: 0.15rem;
    }
    .task-origin {
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      color: var(--text-faint); margin-top: 0.15rem;
    }

    /* ── Action circles ── */
    .action-circle {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
      font-size: 1.2rem; font-weight: 700; line-height: 1;
    }
    .action-circle:active { transform: scale(0.85) }

    .circle-add {
      background: var(--orange); color: #fff;
      box-shadow: 0 2px 6px var(--orange-dim);
    }
    .circle-add:active { background: var(--orange-hover) }
    .circle-add.in-shortlist {
      background: var(--orange-light); color: var(--orange);
      box-shadow: none; border: 2px solid var(--orange);
      font-size: 1rem;
    }

    .circle-delete {
      background: var(--danger); color: #fff;
      box-shadow: 0 2px 6px var(--danger-dim);
    }
    .circle-delete:active { background: #c03030 }

    .circle-done {
      background: var(--success); color: #fff;
      box-shadow: 0 2px 6px var(--success-dim);
    }
    .circle-done:active { background: #257a4a }

    .card-actions { display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center }

    /* ── Shortlist cards ── */
    .shortlist-area {
      padding: 0 clamp(0.5rem, 3vw, 1.5rem);
    }
    .focus-card {
      touch-action: pan-y;
      -webkit-user-select: none; user-select: none;
    }
    .focus-card.over {
      border-color: var(--orange); border-style: dashed;
      box-shadow: var(--shadow-lg);
    }
    .focus-card.dragging { opacity: 0.4; transform: scale(0.97) }

    .drag-handle {
      color: var(--text-faint); font-size: 1.1rem; cursor: grab;
      flex-shrink: 0; line-height: 1; letter-spacing: 2px;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing }

    /* ── Bottom bars ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
      padding: 0.75rem 1.25rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
      display: flex; align-items: center; gap: 0.75rem;
      pointer-events: none;
      max-width: 640px; margin: 0 auto;
    }
    .build-btn {
      flex: 1; background: var(--orange); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 0.85rem 1rem;
      font-family: inherit; font-size: clamp(0.85rem, 1.5vw, 1.05rem); font-weight: 800;
      cursor: pointer; box-shadow: var(--shadow-lg);
      transition: all 0.15s; pointer-events: auto;
      letter-spacing: 0.02em;
    }
    .build-btn:active { background: var(--orange-hover); transform: scale(0.97) }
    .build-btn.inactive {
      background: var(--bg-inset); color: var(--text-faint);
      box-shadow: none; cursor: default;
    }

    .fab {
      width: 3.2rem; height: 3.2rem; border-radius: 50%;
      background: var(--charcoal); color: #fff;
      border: none; font-size: 1.5rem; line-height: 1;
      cursor: pointer; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; flex-shrink: 0; transition: all 0.15s;
    }
    .fab:active { background: var(--orange); transform: scale(0.9) }

    .shortlist-bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
      padding: 0.75rem 1.25rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
      display: flex; justify-content: flex-end;
      pointer-events: none;
      max-width: 640px; margin: 0 auto;
    }

    /* ── Add more section ── */
    .add-more-section {
      margin-top: 1.5rem; border-top: 2px solid var(--border-light);
      padding-top: 1rem;
    }
    .add-more-label {
      font-size: clamp(0.6rem, 1vw, 0.75rem); font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 0.5rem;
    }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.center { align-items: center }
    .modal {
      background: var(--bg-card); box-shadow: var(--shadow-lg);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      width: 100%; max-width: 640px;
      animation: slideUp 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal.centered {
      border-radius: var(--radius);
      max-width: 420px; width: 92%;
      padding: 0; overflow: hidden;
      animation: popIn 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0 } to { transform: scale(1); opacity: 1 } }

    .modal-title {
      font-size: clamp(1rem, 1.8vw, 1.2rem); font-weight: 800;
      color: var(--charcoal); margin-bottom: 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-close {
      background: none; border: none; color: var(--text-faint);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .modal-field { position: relative; margin-bottom: 0.75rem }
    .modal-input {
      width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm);
      padding: 0.85rem 3.2rem 0.85rem 0.85rem;
      font-family: inherit; font-size: clamp(0.9rem, 1.6vw, 1.1rem);
      color: var(--charcoal); background: var(--bg);
      outline: none; transition: border-color 0.15s;
      -webkit-user-select: text; user-select: text; touch-action: auto;
    }
    .modal-input:focus { border-color: var(--orange) }
    .modal-input::placeholder { color: var(--text-faint) }

    .toggle-row {
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 1rem; cursor: pointer; user-select: none;
    }
    .toggle-track {
      width: 2.6rem; height: 1.5rem; border-radius: 0.75rem;
      background: var(--bg-inset); border: 1.5px solid var(--border);
      position: relative; flex-shrink: 0; transition: all 0.2s;
    }
    .toggle-track.on { background: var(--orange); border-color: var(--orange) }
    .toggle-thumb {
      position: absolute; top: 3px; width: 1rem; height: 1rem;
      border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: left 0.2s;
    }
    .toggle-label {
      font-size: clamp(0.75rem, 1.3vw, 0.9rem); color: var(--text-secondary);
    }

    .mic-btn {
      position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
      width: 2.2rem; height: 2.2rem; border-radius: 50%;
      background: var(--orange-light); border: 2px solid var(--orange);
      color: var(--orange); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .mic-btn:active, .mic-btn.listening { background: var(--orange); color: #fff }
    .mic-btn.listening { animation: mic-pulse 1s infinite }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--orange-dim) }
      50% { box-shadow: 0 0 0 8px transparent }
    }
    .mic-btn svg { width: 1.1rem; height: 1.1rem }
    .mic-btn.hidden { display: none }

    .modal-save-btn {
      width: 100%; padding: 0.85rem; border-radius: var(--radius);
      border: none; font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      font-weight: 800; font-family: inherit; cursor: pointer;
      transition: all 0.2s;
    }
    .modal-save-btn.ready { background: var(--orange); color: #fff; box-shadow: var(--shadow-lg) }
    .modal-save-btn.not-ready { background: var(--bg-inset); color: var(--text-faint); cursor: default }

    /* ── Meme modal ── */
    .meme-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.85rem 1rem; border-bottom: 1.5px solid var(--border-light);
    }
    .meme-title { font-size: clamp(0.85rem, 1.4vw, 1rem); font-weight: 800; color: var(--charcoal) }
    .meme-close {
      width: 2rem; height: 2rem; border-radius: 50%;
      background: var(--bg-inset); border: none;
      color: var(--text-faint); font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .meme-body {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px; max-height: 60vh; padding: 0.5rem;
      background: #000;
    }
    .meme-body img {
      max-width: 100%; max-height: 55vh; object-fit: contain;
      border-radius: 4px;
    }
    .meme-loading {
      color: #fff; font-size: 0.9rem; text-align: center; padding: 2rem;
    }
    .meme-error {
      color: var(--text-faint); font-size: 0.85rem; text-align: center; padding: 2rem;
    }
    .meme-footer {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem;
      border-top: 1.5px solid var(--border-light);
    }
    .meme-another {
      flex: 1; padding: 0.65rem; border-radius: var(--radius-sm);
      background: var(--orange); color: #fff; border: none;
      font-family: inherit; font-size: clamp(0.8rem, 1.3vw, 0.95rem);
      font-weight: 800; cursor: pointer; transition: all 0.15s;
    }
    .meme-another:active { background: var(--orange-hover) }
    .meme-sub {
      font-size: clamp(0.55rem, 0.9vw, 0.7rem); color: var(--text-faint);
      text-align: center; padding: 0 1rem 0.5rem;
    }

    /* ── Confirm delete ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-box {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 1.5rem; max-width: 320px; width: 90%;
      box-shadow: var(--shadow-lg); text-align: center;
    }
    .confirm-text {
      font-size: clamp(0.9rem, 1.5vw, 1.05rem); font-weight: 700;
      color: var(--charcoal); margin-bottom: 1rem; line-height: 1.4;
    }
    .confirm-actions { display: flex; gap: 0.5rem }
    .confirm-btn {
      flex: 1; padding: 0.7rem; border-radius: var(--radius-sm);
      border: none; font-family: inherit;
      font-size: clamp(0.8rem, 1.3vw, 0.95rem); font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .confirm-btn.cancel { background: var(--bg-inset); color: var(--text-secondary) }
    .confirm-btn.delete { background: var(--danger); color: #fff }
    .confirm-btn.delete:active { background: #c03030 }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--text-faint);
      font-size: clamp(0.85rem, 1.4vw, 1rem); line-height: 1.6;
    }
    .empty-btn {
      margin-top: 1rem; background: var(--bg-card); border: 1.5px solid var(--border);
      box-shadow: var(--shadow); border-radius: var(--radius);
      padding: 0.7rem 1.5rem; color: var(--charcoal);
      font-size: clamp(0.8rem, 1.3vw, 0.95rem); font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 300;
      background: var(--charcoal); color: #fff;
      padding: 0.6rem 1.2rem; border-radius: var(--radius);
      font-size: clamp(0.75rem, 1.2vw, 0.85rem); font-weight: 700;
      box-shadow: var(--shadow-lg); opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1 }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed; inset: 0; z-index: 400;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      #body { padding-left: 2rem; padding-right: 2rem }
      .header { padding-left: 2rem; padding-right: 2rem }
      .shortlist-area { padding: 0 2rem }
    }
  </style>
</head>
<body>

<div class="header" id="header"></div>
<div id="body"></div>
<div class="toast" id="toast"></div>
<canvas id="confetti-canvas"></canvas>

<script>
/* ═════════════════════════════════════════════
   CONFIG
   ═════════════════════════════════════════════ */
const API_BASE = 'https://syujfvdfgvgsawqbzifr.supabase.co/functions/v1';
const APP_TOKEN = '9f2d7a4c1e8b6f3a0d5c2e9b7a4f1d8c6e3b0a7f5d2c9e6b3a0f7d4c1e8b5a2';
const LEGACY_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dWpmdmRmZ3Znc2F3cWJ6aWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTE2MjYsImV4cCI6MjA5NjI2NzYyNn0.5NiyYi11K-RhwaatxYm1Mf1kb2LF0wndxM1Sscqp3aM';

const OLLIE = 'ollie';
const LS_KEY = 'ollie_task_sorter_v3';
const TODAY = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

const CAT_COLORS = {
  '🏠 Household': '#f59e0b', '👨‍👩‍👧‍👦 Family': '#ec4899',
  '⚖️ Legal & Finance': '#8b5cf6', '🧬 Health & Labs': '#10b981',
  '💻 Tech & Open Brain': '#3b82f6', '📋 Personal': '#6366f1',
  '📚 School': '#0ea5e9', '🎮 Fun': '#f97316',
  '🎬 Generations of Care': '#f97316'
};

const MEME_SUBS = ['surrealmemes', 'hmm', 'skamtebord', 'blursedimages', 'me_irl', 'comedyheaven'];

/* ═════════════════════════════════════════════
   API HELPERS
   ═════════════════════════════════════════════ */
function apiHeaders(json) {
  const h = { 'x-app-token': APP_TOKEN, 'apikey': LEGACY_ANON_KEY, 'Authorization': 'Bearer ' + LEGACY_ANON_KEY };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

async function fetchTasks() {
  const res = await fetch(API_BASE + '/get-tasks', { headers: apiHeaders() });
  if (!res.ok) throw new Error('get-tasks responded with ' + res.status);
  const data = await res.json();
  return (data.tasks || [])
    .filter(t => t.speaker === OLLIE || t.for_person === OLLIE)
    .map(t => ({
      id: t.id,
      text: t.task_title || t.content,
      rawContent: t.content,
      cat: t.category || '📋 Personal',
      speaker: t.speaker || null,
      for_person: t.for_person || null
    }));
}

async function markTaskDone(id) {
  const res = await fetch(API_BASE + '/mark-tasks-done', {
    method: 'POST', headers: apiHeaders(true),
    body: JSON.stringify({ id })
  });
  if (!res.ok) throw new Error('mark-tasks-done responded with ' + res.status);

function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) Object.entries(props).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else if (k === 'dataset') Object.entries(v).forEach(([dk, dv]) => e.dataset[dk] = dv);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  });
  return e;
}
const div = (p, ...c) => el('div', p, ...c);

/* ═════════════════════════════════════════════
   CONFETTI 🎉
   ═════════════════════════════════════════════ */
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
let confettiParticles = [];
let confettiRunning = false;

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ['#E8731A', '#2E8B57', '#3b82f6', '#ec4899', '#f59e0b', '#8b5cf6', '#00e5ff', '#ff6b6b'];

function launchConfetti(x, y) {
  const count = 45;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 4 + Math.random() * 7;
    confettiParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size: 4 + Math.random() * 4,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 15,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    animateConfetti();
  }
}

function animateConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25; // gravity
    p.vx *= 0.98;
    p.rotation += p.rotationSpeed;
    p.life -= p.decay;

    if (p.life <= 0) return;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;

    if (p.shape === 'rect') {
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });

  confettiParticles = confettiParticles.filter(p => p.life > 0);
  if (confettiParticles.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiRunning = false;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

async function handleDone(task, buttonEl) {

/* ═════════════════════════════════════════════
   DRAG & DROP
   ═════════════════════════════════════════════ */
const dragState = { active: false, id: null, startY: 0, node: null };

function touchStart(e, id) {
  e.preventDefault(); e.stopPropagation();
  const t = e.touches[0];
  dragState.active = true; dragState.id = id; dragState.startY = t.clientY;
  dragState.node = e.currentTarget.closest('.focus-card');
  dragState.node.style.opacity = '0.4';
  dragState.node.style.transform = 'scale(1.02)';
  dragState.node.style.zIndex = '999';
}

function touchMove(e) {
  if (!dragState.active) return;
  e.preventDefault();
  const t = e.touches[0];
  dragState.node.style.transform = `translateY(${t.clientY - dragState.startY}px) scale(1.02)`;
  document.querySelectorAll('[data-drag-id]').forEach(n => {
    if (n === dragState.node) return;
    const r = n.getBoundingClientRect();
    n.classList.toggle('over', t.clientY >= r.top && t.clientY <= r.bottom);
  });
}

function touchEnd(e) {
  if (!dragState.active) return;
  dragState.active = false;
  const t = e.changedTouches[0];
  dragState.node.style.transform = '';
  dragState.node.style.opacity = '';
  dragState.node.style.zIndex = '';
  document.querySelectorAll('[data-drag-id]').forEach(n => n.classList.remove('over'));

  let targetId = null;
  document.querySelectorAll('[data-drag-id]').forEach(n => {
    if (n === dragState.node) return;
    const r = n.getBoundingClientRect();
    if (t.clientY >= r.top && t.clientY <= r.bottom) targetId = n.dataset.dragId;
  });

  if (targetId && targetId !== dragState.id) {
    const arr = [...STATE.shortlist];
    const fi = arr.indexOf(dragState.id), ti = arr.indexOf(targetId);
    arr.splice(fi, 1); arr.splice(ti, 0, dragState.id);
    setState({ shortlist: arr });
  }
  dragState.id = null;
}

/* ═════════════════════════════════════════════
   VOICE-TO-TEXT
   ═════════════════════════════════════════════ */
let recognition = null;
let isListening = false;
let micInputEl = null;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onresult = function(e) {
    if (!micInputEl) return;
    let final = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const existing = micInputEl.dataset.preVoice || '';
    if (final) {
      micInputEl.value = (existing ? existing + ' ' : '') + final;
      micInputEl.dataset.preVoice = micInputEl.value;
    } else {
      micInputEl.value = (existing ? existing + ' ' : '') + interim;
    }
    micInputEl.dispatchEvent(new Event('input'));
  };

  recognition.onstart = function() {
    isListening = true;
    const mb = document.getElementById('micBtn');
    if (mb) mb.classList.add('listening');
  };

  recognition.onend = function() {
    isListening = false;
    const mb = document.getElementById('micBtn');
    if (mb) mb.classList.remove('listening');
    if (micInputEl) micInputEl.dataset.preVoice = micInputEl.value;
  };

  recognition.onerror = function(e) {
    console.warn('Speech error:', e.error);
    isListening = false;
    const mb = document.getElementById('micBtn');
    if (mb) mb.classList.remove('listening');
    if (e.error === 'no-speech') toast('No speech detected — try again');
    else if (e.error === 'not-allowed') toast('Microphone blocked — check browser settings');
  };

  return true;
}

async function toggleMic(inputEl) {
  if (!recognition) return;
  micInputEl = inputEl;
  if (isListening) {
    try { recognition.stop() } catch {}
    isListening = false;
    const mb = document.getElementById('micBtn');
    if (mb) mb.classList.remove('listening');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
  } catch (e) {
    console.warn('Mic permission denied:', e);
    toast('Allow microphone access in your browser settings');
    return;
  }
  inputEl.dataset.preVoice = inputEl.value;
  try { recognition.start() } catch (e) { console.warn('Recognition start:', e) }
}

let memeCache = [];

async function fetchMemes() {
  const sub = MEME_SUBS[Math.floor(Math.random() * MEME_SUBS.length)];
  try {
    const res = await fetch(`https://www.reddit.com/r/${sub}/hot.json?limit=50&raw_json=1`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error('Reddit ' + res.status);
    const data = await res.json();
    const posts = (data.data?.children || [])
      .map(c => c.data)
      .filter(p =>
        !p.over_18 &&
        !p.stickied &&
        p.post_hint === 'image' &&
        p.url &&
        /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(p.url)
      )
      .map(p => ({ url: p.url, title: p.title, sub: 'r/' + p.subreddit }));
    return posts;
  } catch (err) {
    console.warn('Meme fetch error:', err);
    return [];
  }
}

async function getRandomMeme() {
  if (memeCache.length < 3) {
    const fresh = await fetchMemes();
    memeCache.push(...fresh);
  }
  if (!memeCache.length) return null;
  const idx = Math.floor(Math.random() * memeCache.length);
  return memeCache.splice(idx, 1)[0];
}

function showMemeModal() {
  // Remove existing
  document.querySelectorAll('.meme-overlay').forEach(e => e.remove());

  const overlay = div({ className: 'modal-overlay center meme-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() });

  const modal = div({ className: 'modal centered' });
  modal.addEventListener('click', e => e.stopPropagation());

  const header = div({ className: 'meme-header' });
  header.appendChild(span({ className: 'meme-title' }, '🫠 weird guy'));
  const closeBtn = btn({ className: 'meme-close' }, '✕');
  closeBtn.addEventListener('click', () => overlay.remove());
  header.appendChild(closeBtn);
  modal.appendChild(header);

  const body = div({ className: 'meme-body' });
  body.appendChild(div({ className: 'meme-loading' }, 'Finding something unhinged…'));
  modal.appendChild(body);

  const subLabel = div({ className: 'meme-sub' });
  modal.appendChild(subLabel);

  const footer = div({ className: 'meme-footer' });
  const anotherBtn = btn({ className: 'meme-another' }, '🎲 Another one');
  anotherBtn.addEventListener('click', () => loadMemeInto(body, subLabel));
  footer.appendChild(anotherBtn);
  modal.appendChild(footer);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  loadMemeInto(body, subLabel);
}

async function loadMemeInto(bodyEl, subEl) {
  bodyEl.innerHTML = '';
  bodyEl.appendChild(div({ className: 'meme-loading' }, 'Finding something unhinged…'));
  subEl.textContent = '';

  const meme = await getRandomMeme();
  bodyEl.innerHTML = '';

  if (!meme) {
    bodyEl.appendChild(div({ className: 'meme-error' }, 'Could not load a meme 😔 Try again'));
    return;
  }

  const img = el('img', { src: meme.url, alt: meme.title });
  img.onerror = () => {
    bodyEl.innerHTML = '';
    bodyEl.appendChild(div({ className: 'meme-error' }, 'Image failed to load — try another'));
  };
  bodyEl.appendChild(img);
  subEl.textContent = meme.sub;
}

function buildModal() {
  let text = '', addToShortlist = STATE.modalDefaultToday, saving = false;

  const textInput = inp({ type: 'text', placeholder: 'What do you need to do?', autofocus: 'true', className: 'modal-input' });
  textInput.style.paddingRight = hasSpeech ? '3.2rem' : '0.85rem';

  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSave() });

  const field = div({ className: 'modal-field' });
  field.appendChild(textInput);

  if (hasSpeech) {
    const micSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>';

    track.className = 'toggle-track' + (addToShortlist ? ' on' : '');
    thumb.style.left = addToShortlist ? '1.35rem' : '0.25rem';
  });

  const saveBtn = btn({ className: 'modal-save-btn not-ready' }, 'Save Task');
  saveBtn.addEventListener('click', doSave);

  function updateSave() { if (!saving) saveBtn.className = 'modal-save-btn ' + (text.trim() ? 'ready' : 'not-ready') }

  async function doSave() {
    if (!text.trim() || saving) return;
    saving = true;
    saveBtn.className = 'modal-save-btn not-ready';
    saveBtn.textContent = 'Saving…';
    try {
      const result = await createTask(text.trim());
      const t = { id: result.id, text: result.task_title || text.trim(), cat: result.category || '📋 Personal', speaker: null, for_person: 'ollie' };
      const patch = { tasks: [...STATE.tasks, t], modalOpen: false };
      if (addToShortlist) {
        patch.shortlist = [...STATE.shortlist, t.id];
        const s = new Set(STATE.selected); s.add(t.id); patch.selected = s;
      }
      setState(patch);
      toast('Task added ✓');
    } catch (err) {
      console.error(err);
      saving = false;
      saveBtn.textContent = 'Save Task';
      updateSave();
      toast('Could not save — check connection');
    }
  }

  const overlay = div({ className: 'modal-overlay' });
  overlay.addEventListener('click', () => { if (!saving) setState({ modalOpen: false }) });
  const modal = div({ className: 'modal' });
  modal.addEventListener('click', e => e.stopPropagation());

  modal.appendChild(div({ className: 'modal-title' },
    h2({ style: { fontSize: 'inherit', fontWeight: '800', color: 'var(--charcoal)', fontFamily: 'inherit' } }, 'New Task'),
    btn({ className: 'modal-close', onClick: () => { if (!saving) setState({ modalOpen: false }) } }, '×')
  ));
  modal.appendChild(field);
  modal.appendChild(toggleRow);
  modal.appendChild(saveBtn);
  overlay.appendChild(modal);

  requestAnimationFrame(() => requestAnimationFrame(() => textInput.focus()));
  return overlay;
}

  if (STATE.loadError) {

    em.appendChild(p_({ style: { marginTop: '0.5rem' } }, 'Use the + button to add one, or tell Alexa.'));

      if (task.for_person === 'ollie' && task.speaker !== 'ollie') {
        info.appendChild(div({ className: 'task-origin' }, 'assigned to you'));

      card.appendChild(info);

      const actions = div({ className: 'card-actions' });

      // 🟠 Orange + (add to shortlist)
      const addBtn = btn({ className: 'action-circle circle-add' + (isSel ? ' in-shortlist' : '') }, isSel ? '✓' : '+');
      addBtn.addEventListener('click', () => {
        const s = new Set(STATE.selected);
        s.has(task.id) ? s.delete(task.id) : s.add(task.id);
        setState({ selected: s });
      });
      actions.appendChild(addBtn);

      // 🟢 Green ✓ (done)
      const doneBtn = btn({ className: 'action-circle circle-done' }, '✓');
      doneBtn.addEventListener('click', () => handleDone(task, doneBtn));
      actions.appendChild(doneBtn);

      // 🔴 Red − (delete)
      const delBtn = btn({ className: 'action-circle circle-delete' }, '−');
      delBtn.addEventListener('click', () => showConfirmDelete(task));
      actions.appendChild(delBtn);

      card.appendChild(actions);
      sec.appendChild(card);
    });
    wrap.appendChild(sec);
  });

  return wrap;
}

/* ═════════════════════════════════════════════
   SHORTLIST VIEW
   ═════════════════════════════════════════════ */
function buildFocus() {
  const wrap = div({});

  if (!STATE.shortlist.length) {
    const em = div({ className: 'empty-state' });
    em.appendChild(p_({}, '📋 Your shortlist is empty.'));
    const gb = btn({ className: 'empty-btn' }, 'Go to Full List →');
    gb.addEventListener('click', () => setState({ mode: 'review' }));
    em.appendChild(gb);
    return em;
  }

  wrap.appendChild(p_({ className: 'hint' }, 'Drag ⠿ to reorder'));

  const list = div({ className: 'shortlist-area' });
  const taskMap = Object.fromEntries(STATE.tasks.map(t => [t.id, t]));

  STATE.shortlist.forEach(tid => {
    const task = taskMap[tid];
    if (!task) return;

    const card = div({ className: 'card focus-card', dataset: { dragId: String(task.id) }, draggable: 'true' });

    const handle = span({ className: 'drag-handle' }, '⠿');
    handle.addEventListener('touchstart', e => touchStart(e, task.id), { passive: false });
    handle.addEventListener('touchmove', touchMove, { passive: false });
    handle.addEventListener('touchend', touchEnd);
    card.appendChild(handle);

    card.addEventListener('dragstart', e => { deskDragId = task.id; e.dataTransfer.effectAllowed = 'move' });
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('over') });
    card.addEventListener('dragleave', () => card.classList.remove('over'));
    card.addEventListener('drop', e => {
      e.preventDefault(); card.classList.remove('over');
      if (deskDragId === task.id) return;
      const arr = [...STATE.shortlist];
      const fi = arr.indexOf(deskDragId), ti = arr.indexOf(task.id);
      arr.splice(fi, 1); arr.splice(ti, 0, deskDragId);
      setState({ shortlist: arr });
    });
    card.addEventListener('dragend', () => deskDragId = null);

    const info = div({ style: { flex: '1' } });
    info.appendChild(div({ className: 'task-text' }, task.text));
    info.appendChild(div({ className: 'task-cat-label' }, task.cat));
    card.appendChild(info);

    // 🟢 Green ✓ (done)
    const doneBtn = btn({ className: 'action-circle circle-done' }, '✓');
    doneBtn.addEventListener('click', e => { e.stopPropagation(); handleDone(task, doneBtn) });
    card.appendChild(doneBtn);

    list.appendChild(card);
  });

  wrap.appendChild(list);

  // Add more
  const extras = STATE.tasks.filter(t => !STATE.selected.has(t.id));
  if (extras.length) {
    const sec = div({ className: 'add-more-section' });
    sec.appendChild(p_({ className: 'add-more-label' }, 'Add more to shortlist'));
    extras.forEach(task => {
      const row = div({ className: 'card', style: { opacity: '0.65' } });
      row.appendChild(div({ className: 'task-text', style: { flex: '1' } }, task.text));
      const ab = btn({ className: 'action-circle circle-add', style: { width: '2.2rem', height: '2.2rem', fontSize: '1rem' } }, '+');
      ab.addEventListener('click', () => {
        const s = new Set(STATE.selected); s.add(task.id);
        setState({ shortlist: [...STATE.shortlist, task.id], selected: s });
      });
      row.appendChild(ab);
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  }

  return wrap;
}

/* ═════════════════════════════════════════════
   RENDER
   ═════════════════════════════════════════════ */
function render() {
  buildHeader();
  const body = document.getElementById('body');
  body.innerHTML = '';
  body.appendChild(STATE.mode === 'review' ? buildReview() : buildFocus());

  document.querySelectorAll('.bottom-bar, .shortlist-bottom-bar').forEach(e => e.remove());

  if (STATE.mode === 'review') {
    const bar = div({ className: 'bottom-bar' });
    const buildBtn = btn({
      className: 'build-btn' + (STATE.selected.size ? '' : ' inactive')
    }, STATE.selected.size ? `Build Short List Now (${STATE.selected.size})` : 'Select tasks to build your shortlist');
    buildBtn.addEventListener('click', () => {
      if (!STATE.selected.size) return;
      setState({ shortlist: STATE.tasks.filter(t => STATE.selected.has(t.id)).map(t => t.id), mode: 'focus' });
    });
    bar.appendChild(buildBtn);
    const fabBtn = btn({ className: 'fab' }, '＋');
    fabBtn.addEventListener('click', () => setState({ modalOpen: true, modalDefaultToday: false }));
    bar.appendChild(fabBtn);
    document.body.appendChild(bar);
  } else {
    const bar = div({ className: 'shortlist-bottom-bar' });
    const fabBtn = btn({ className: 'fab' }, '＋');
    fabBtn.addEventListener('click', () => setState({ modalOpen: true, modalDefaultToday: true }));
    bar.appendChild(fabBtn);
    document.body.appendChild(bar);
  }

  document.querySelectorAll('.modal-overlay:not(.meme-overlay)').forEach(e => e.remove());
  if (STATE.modalOpen) document.body.appendChild(buildModal());
}

/* ═════════════════════════════════════════════
   TOAST
   ═════════════════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ═════════════════════════════════════════════
   INIT
   ═════════════════════════════════════════════ */
render();
loadTasks();
</script>
</body>
</html>
